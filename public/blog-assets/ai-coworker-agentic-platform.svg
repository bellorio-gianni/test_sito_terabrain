<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 860" role="img" aria-labelledby="title desc">
  <title id="title">AI Co-Worker o Agentic AI Platform</title>
  <desc id="desc">Un manager attraversa il passaggio da caos documentale a piattaforma agentica con nodi, regole e governance</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="0">
