<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 860" role="img" aria-labelledby="title desc">
  <title id="title">Agent AI Chief Curator</title>
  <desc id="desc">Silhouette di manager davanti a un flusso informativo arancione filtrato dagli Agent AI</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#ff9b18"/>
      <stop offset="35%" stop-color="#d65309"/>
      <stop offset="72%" stop-color="#3b1208"/>
      <stop offset="100%" stop-color="#070607"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffd46b"/>
      <stop offset="100%" stop-color="#ff850f"/>
    </linearGradient>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
