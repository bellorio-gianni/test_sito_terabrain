<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">TeraBrain multi platform agent cooperation infographic</title>
  <desc id="desc">TeraBrain control plane cooperating with external agents and platforms through API, webhook and MCP Server.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#05050c"/>
      <stop offset="0.55" stop-color="#121426"/>
      <stop offset="1" stop-color="#071312"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="620" rx="34" fill="url(#bg)"/>
  <text x="70" y="80" fill="#ff9a4e" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="4">COOPERAZIONE MULTI-PIATTAFORMA</text>
  <text x="70" y="123" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850">TeraBrain come control plane per agenti e sistemi esterni</text>
  <g stroke="#ff7a2b" stroke-width="3" opacity="0.65">
    <path d="M640 312L275 222"/>
    <path d="M640 312L1005 222"/>
    <path d="M640 312L275 435"/>
    <path d="M640 312L1005 435"/>
    <path d="M640 312L640 508"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <circle cx="640" cy="312" r="104" fill="#17192b" stroke="#ff7a2b" stroke-width="4"/>
    <text x="640" y="292" text-anchor="middle" fill="#fff" font-size="31" font-weight="900">TERABRAIN</text>
    <text x="640" y="329" text-anchor="middle" fill="#ffc46b" font-size="18" font-weight="850">Agent Control Plane</text>
    <text x="640" y="356" text-anchor="middle" fill="#c9cbd8" font-size="16">routing · memory · audit · policy</text>
    <g>
      <rect x="105" y="160" width="305" height="120" rx="24" fill="#17192b" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="136" y="204" fill="#fff" font-size="25" font-weight="850">SaaS Agents</text>
      <text x="136" y="237" fill="#c9cbd8" font-size="17">assistenti verticali, CRM AI,</text>
      <text x="136" y="261" fill="#c9cbd8" font-size="17">ERP AI, support platforms</text>
    </g>
    <g>
      <rect x="870" y="160" width="305" height="120" rx="24" fill="#17192b" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="901" y="204" fill="#fff" font-size="25" font-weight="850">Automation</text>
      <text x="901" y="237" fill="#c9cbd8" font-size="17">workflow engine, webhook,</text>
      <text x="901" y="261" fill="#c9cbd8" font-size="17">RPA e orchestration suite</text>
    </g>
    <g>
      <rect x="105" y="377" width="305" height="120" rx="24" fill="#17192b" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="136" y="421" fill="#fff" font-size="25" font-weight="850">Enterprise Apps</text>
      <text x="136" y="454" fill="#c9cbd8" font-size="17">CRM, ERP, ticketing, DMS,</text>
      <text x="136" y="478" fill="#c9cbd8" font-size="17">database e knowledge base</text>
    </g>
    <g>
      <rect x="870" y="377" width="305" height="120" rx="24" fill="#17192b" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="901" y="421" fill="#fff" font-size="25" font-weight="850">External Agents</text>
      <text x="901" y="454" fill="#c9cbd8" font-size="17">specialisti AI di altre</text>
      <text x="901" y="478" fill="#c9cbd8" font-size="17">piattaforme e modelli</text>
    </g>
    <g>
      <rect x="475" y="498" width="330" height="78" rx="24" fill="#10131d" stroke="#ff7a2b" stroke-opacity="0.45"/>
      <text x="640" y="530" text-anchor="middle" fill="#fff" font-size="22" font-weight="850">API · Webhook · MCP Server</text>
      <text x="640" y="558" text-anchor="middle" fill="#c9cbd8" font-size="16">scambio contesto controllato e minimizzato</text>
    </g>
