<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">TeraBrain platform architecture infographic</title>
  <desc id="desc">Four architecture blocks: LLM, Memory and RAG, Duty, Skills MCP Server and Voice BOT.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17182a"/>
      <stop offset="0.55" stop-color="#090a13"/>
      <stop offset="1" stop-color="#15100a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#ff7a2b"/>
      <stop offset="1" stop-color="#ffc46b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="620" rx="34" fill="url(#bg)"/>
  <circle cx="154" cy="92" r="180" fill="#ff7a2b" opacity="0.11"/>
  <circle cx="1110" cy="528" r="220" fill="#53d0aa" opacity="0.09"/>
  <text x="72" y="78" fill="#ff9a4e" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="4">ARCHITETTURA TERABRAIN</text>
  <text x="72" y="123" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850">Modelli, memoria, duty e skill in un layer governato</text>
  <g stroke="#ff7a2b" stroke-width="4" stroke-linecap="round" opacity="0.78">
    <path d="M295 323h176"/>
    <path d="M625 323h176"/>
    <path d="M470 323c50-95 110-95 158 0"/>
    <path d="M802 323c50-95 110-95 158 0"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="62" y="220" width="250" height="255" rx="24" fill="#16182a" stroke="#ffffff" stroke-opacity="0.14"/>
    <rect x="362" y="220" width="250" height="255" rx="24" fill="#16182a" stroke="#ffffff" stroke-opacity="0.14"/>
    <rect x="662" y="220" width="250" height="255" rx="24" fill="#16182a" stroke="#ffffff" stroke-opacity="0.14"/>
    <rect x="962" y="220" width="250" height="255" rx="24" fill="#16182a" stroke="#ffffff" stroke-opacity="0.14"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <g>
      <circle cx="187" cy="285" r="39" fill="url(#orange)"/>
      <text x="187" y="294" text-anchor="middle" fill="#08090d" font-size="26" font-weight="900">01</text>
      <text x="92" y="356" fill="#fff" font-size="27" font-weight="850">LLM multi-modello</text>
      <text x="92" y="394" fill="#c9cbd8" font-size="18">OpenAI, Claude, Gemini,</text>
      <text x="92" y="421" fill="#c9cbd8" font-size="18">open source e modelli</text>
      <text x="92" y="448" fill="#c9cbd8" font-size="18">verticali per ogni agent.</text>
    </g>
    <g>
      <circle cx="487" cy="285" r="39" fill="#53d0aa"/>
      <text x="487" y="294" text-anchor="middle" fill="#08090d" font-size="26" font-weight="900">02</text>
      <text x="392" y="356" fill="#fff" font-size="27" font-weight="850">Memoria + RAG</text>
      <text x="392" y="394" fill="#c9cbd8" font-size="18">Contesto, storico,</text>
      <text x="392" y="421" fill="#c9cbd8" font-size="18">documenti, knowledge base,</text>
      <text x="392" y="448" fill="#c9cbd8" font-size="18">CRM, ERP e procedure.</text>
    </g>
    <g>
      <circle cx="787" cy="285" r="39" fill="#8bb7ff"/>
      <text x="787" y="294" text-anchor="middle" fill="#08090d" font-size="26" font-weight="900">03</text>
      <text x="692" y="356" fill="#fff" font-size="27" font-weight="850">Duty dell'agent</text>
      <text x="692" y="394" fill="#c9cbd8" font-size="18">Ruolo, compiti, tono,</text>
      <text x="692" y="421" fill="#c9cbd8" font-size="18">limiti, escalation, KPI</text>
      <text x="692" y="448" fill="#c9cbd8" font-size="18">e responsabilita.</text>
    </g>
    <g>
      <circle cx="1087" cy="285" r="39" fill="#f2cf77"/>
      <text x="1087" y="294" text-anchor="middle" fill="#08090d" font-size="26" font-weight="900">04</text>
      <text x="992" y="356" fill="#fff" font-size="27" font-weight="850">Skill + MCP</text>
      <text x="992" y="394" fill="#c9cbd8" font-size="18">Tool, API, workflow,</text>
      <text x="992" y="421" fill="#c9cbd8" font-size="18">MCP Server e Voice BOT</text>
      <text x="992" y="448" fill="#c9cbd8" font-size="18">per operare sui sistemi.</text>
    </g>
  </g>
  <rect x="318" y="522" width="644" height="52" rx="26" fill="#0d0f1d" stroke="#ff7a2b" stroke-opacity="0.36"/>
  <text x="640" y="555" text-anchor="middle" fill="#ffc46b" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Agent Control Plane: policy, logging, audit, osservabilita, cost control</text>
</svg>
